<!DOCTYPE html>
<html class="staticrypt-html">
<head>
    <meta charset="utf-8" />
    <title>vie</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="cache-control" content="max-age=0" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
    <meta http-equiv="pragma" content="no-cache" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --input-bg: rgba(255, 255, 255, 0.04);
            --input-focus: rgba(88, 166, 255, 0.15);
            --danger: #f85149;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        .staticrypt-html {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .staticrypt-body {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(ellipse 80% 60% at 50% -20%, rgba(88, 166, 255, 0.08), transparent),
                radial-gradient(ellipse 60% 50% at 50% 120%, rgba(88, 166, 255, 0.04), transparent),
                var(--bg);
        }

        .staticrypt-content {
            width: 100%;
            max-width: 400px;
            padding: 24px;
        }

        .staticrypt-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 32px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center;
        }

        .staticrypt-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 20px;
            background: rgba(88, 166, 255, 0.12);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .staticrypt-icon svg {
            width: 22px;
            height: 22px;
            stroke: var(--accent);
            fill: none;
            stroke-width: 2;
        }

        .staticrypt-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text);
            margin-bottom: 6px;
        }

        .staticrypt-instructions {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 28px;
        }

        .staticrypt-username-container {
            position: relative;
            margin-bottom: 14px;
        }

        .staticrypt-username-container input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .staticrypt-username-container input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--input-focus);
        }

        .staticrypt-username-container input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .staticrypt-password-container {
            position: relative;
            margin-bottom: 20px;
        }

        .staticrypt-password-container input {
            width: 100%;
            padding: 14px 44px 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .staticrypt-password-container input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--input-focus);
        }

        .staticrypt-password-container input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .staticrypt-toggle-password-visibility {
            cursor: pointer;
            height: 20px;
            opacity: 0.5;
            padding: 13px;
            position: absolute;
            right: 2px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            transition: opacity 0.15s;
        }

        .staticrypt-toggle-password-visibility:hover {
            opacity: 0.8;
        }

        .staticrypt-decrypt-button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .staticrypt-decrypt-button:hover {
            background: var(--accent-hover);
        }

        .staticrypt-decrypt-button:active {
            transform: scale(0.98);
        }

        .staticrypt-remember {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .staticrypt-remember input[type="checkbox"] {
            accent-color: var(--accent);
            cursor: pointer;
        }

        .staticrypt-error {
            color: var(--danger);
            font-size: 13px;
            margin-top: 12px;
            min-height: 18px;
        }

        .hidden { display: none !important; }

        .staticrypt-spinner-container {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .staticrypt-spinner {
            width: 2rem;
            height: 2rem;
            border: 2px solid rgba(255, 255, 255, 0.12);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .staticrypt-content {
                padding: 16px;
            }
            .staticrypt-card {
                padding: 32px 20px;
                border-radius: 14px;
            }
        }
    </style>
</head>

                isRememberChecked = document.getElementById("staticrypt-remember").checked;
            const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);
            if (!isSuccessful) {
                alert(templateError);
            }
        });
